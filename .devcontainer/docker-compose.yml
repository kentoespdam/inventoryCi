services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/var/www/html:cached
    working_dir: /var/www/html
    user: www-data
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      PHP_IDE_CONFIG: "serverName=invci"
      database.default.hostname: db
      database.default.database: invci
      database.default.username: invci
      database.default.password: invci
      database.default.DBDriver: MySQLi
      database.default.port: 3306
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sleep infinity
    networks:
      - invci-networks

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invci
      MYSQL_USER: invci
      MYSQL_PASSWORD: invci
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - invci-networks

volumes:
  db-data:

networks:
  invci-networks:
    driver: bridge
